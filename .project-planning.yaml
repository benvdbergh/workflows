# Workflows repository — planning manifest
#
# Override: canonical epics/stories live in GitHub issues + Project #4, not local
# markdown. Generic project-planning defaults (epics_dir/stories_dir as the write
# target) do NOT apply here.
#
# Full policy: .claude/skills/wf-plan/references/workflows-github-backlog-override.md

version: 1

planning_canonical_store: github

github:
  repo: benvdbergh/workflows
  project_number: 4
  project_url: https://github.com/users/benvdbergh/projects/4

# Example GitHub CLI usage (from repo root; requires `gh auth login`).
# Adjust flags to match your labels and milestones.
#
# Open issues:
#   gh issue list --repo benvdbergh/workflows --state open
#
# View one issue (title, body, labels — body is the story/epic narrative):
#   gh issue view 123 --repo benvdbergh/workflows
#   gh issue view 123 --repo benvdbergh/workflows --json title,body,labels,state,number
#
# Search by label (examples — use repo’s actual label names):
#   gh issue list --repo benvdbergh/workflows --label "type:epic"
#
# Create or update issues (planning output lands here):
#   gh issue create --repo benvdbergh/workflows --title "..." --body-file body.md
#   gh issue edit 123 --repo benvdbergh/workflows --body-file body.md
#
# Project (classic user project; field IDs may vary — use `gh project field-list`):
#   gh project item-list 4 --owner benvdbergh --format json
#   gh project view 4 --owner benvdbergh
#
# Parent/child (sub-issue) links: use GitHub UI or REST Sub-issues API; see `gh help` for current `gh issue` subcommands.
#
# Historical per-epic/per-story markdown under docs/ was removed after GitHub backlog migration.
legacy_markdown_mirror:
  removed: true
