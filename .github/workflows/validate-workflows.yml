name: Validate workflow definitions

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  validate-workflows:
    runs-on: ubuntu-latest
    steps:
      # checkout@v5 / setup-node@v5 run on Node 24 (GitHub deprecation of Node 20 on Actions)
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: "24"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Validate POC workflow JSON against schema
        run: npm run validate-workflows

      - name: Run conformance harness
        run: npm run conformance
