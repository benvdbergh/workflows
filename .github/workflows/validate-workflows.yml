name: Validate workflow definitions

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]
  merge_group:

permissions:
  contents: read

concurrency:
  group: validate-workflows-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate-workflows:
    name: validate-workflows
    uses: ./.github/workflows/reusable-validate-and-test.yml
    permissions:
      contents: read
