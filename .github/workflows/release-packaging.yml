name: Release packaging (manual)

on:
  workflow_dispatch:
    inputs:
      release_ref:
        description: "Git ref to package (tag, branch, or SHA)"
        required: true
        type: string
      artifact_retention_days:
        description: "Artifact retention in days (short for alpha cadence)"
        required: false
        default: "7"
        type: string

permissions:
  contents: read

concurrency:
  group: release-packaging-${{ github.event.inputs.release_ref }}
  cancel-in-progress: false

jobs:
  quality-gates:
    name: release-quality-gates
    uses: ./.github/workflows/reusable-validate-and-test.yml
    with:
      checkout_ref: ${{ github.event.inputs.release_ref }}
      node_version: "24"
      run_tests: true
    permissions:
      contents: read

  package-artifact:
    name: package-npm-artifact
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: quality-gates
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          ref: ${{ github.event.inputs.release_ref }}

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "24"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Verify package contents (workspace dry run)
        run: npm pack --dry-run --workspace @agent-workflow-protocol/engine

      - name: Build package tarball (workspace)
        run: npm pack --workspace @agent-workflow-protocol/engine

      - name: Upload package artifact
        uses: actions/upload-artifact@v4
        with:
          name: npm-package-${{ github.event.inputs.release_ref }}
          path: "*.tgz"
          if-no-files-found: error
          retention-days: ${{ fromJSON(github.event.inputs.artifact_retention_days) }}
