name: Release npm publish (manual, break-glass)

on:
  workflow_dispatch:
    inputs:
      release_ref:
        description: "Git ref to publish (tag, branch, or SHA)"
        required: true
        type: string
      dist_tag:
        description: "npm dist-tag to publish under"
        required: true
        type: choice
        options:
          - alpha
          - latest
        default: alpha
      also_point_latest_dist_tag:
        description: "After publish, run npm dist-tag add @agent-workflow/engine@<version> latest (use for intentional latest promotions only; leave false for alpha-only drops)"
        required: false
        type: boolean
        default: false

permissions:
  contents: read

concurrency:
  group: release-npm-publish-${{ github.event.inputs.release_ref }}-${{ github.event.inputs.dist_tag }}
  cancel-in-progress: false

jobs:
  quality-gates:
    name: release-quality-gates
    uses: ./.github/workflows/reusable-validate-and-test.yml
    with:
      checkout_ref: ${{ github.event.inputs.release_ref }}
      node_version: "24"
      run_tests: true
    permissions:
      contents: read

  publish-engine:
    name: publish-engine-package
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: quality-gates
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.inputs.release_ref }}

      - name: Set up Node.js for npm registry
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: npm
          registry-url: "https://registry.npmjs.org"

      - name: Install dependencies
        run: npm ci

      - name: Verify package contents (workspace dry run)
        run: npm pack --dry-run --workspace @agent-workflow/engine

      - name: Publish engine package with provenance
        env:
          DIST_TAG: ${{ github.event.inputs.dist_tag }}
        run: npm publish --workspace @agent-workflow/engine --tag "$DIST_TAG" --access public --provenance

      # npm dist-tag add does not use OIDC the same way as publish; a follow-up step often
      # gets E401. Re-run setup-node for a fresh registry session, then promote. If this
      # still fails, set repository secret NPM_TOKEN (automation token) or promote locally.
      - name: Refresh npm auth for latest promotion
        if: >-
          ${{ github.event.inputs.also_point_latest_dist_tag
          && github.event.inputs.dist_tag != 'latest' }}
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"

      - name: Point latest dist-tag at published version
        if: >-
          ${{ github.event.inputs.also_point_latest_dist_tag
          && github.event.inputs.dist_tag != 'latest' }}
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          set -euo pipefail
          VERSION=$(jq -r .version packages/engine/package.json)
          PKG="@agent-workflow/engine"
          echo "Moving npm dist-tag 'latest' to ${PKG}@${VERSION}"
          if [ -n "${NODE_AUTH_TOKEN:-}" ]; then
            npm dist-tag add "${PKG}@${VERSION}" latest
            exit 0
          fi
          if npm dist-tag add "${PKG}@${VERSION}" latest; then
            exit 0
          fi
          echo "::error::Could not set npm dist-tag 'latest'. @${PKG}@${VERSION} is already published (check the prior publish step tag). Trusted publishing (OIDC) often cannot run 'npm dist-tag add' — add repository secret NPM_TOKEN (automation token with publish access) and re-run this workflow, or promote locally: npm dist-tag add ${PKG}@${VERSION} latest"
          exit 1
